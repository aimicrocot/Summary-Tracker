<div class="facts-memory-tracker-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Facts Memory Tracker</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <input id="fmt_auto_scan" type="checkbox" />
                <label for="fmt_auto_scan">Включить авто-сканирование (каждые 4 сообщ.)</label>
            </div>
            
            <hr />

            <div style="margin-top: 10px;">
                <input id="fmt_manual_scan" class="menu_button" type="submit" value="Сканировать сейчас" />
            </div>
            
            <p><small>Нажмите для проверки доступа к сообщениям чата.</small></p>
        </div>
    </div>
</div>
