<div class="facts-memory-tracker-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Facts Memory Tracker</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container">
                <input id="fmt_auto_scan" type="checkbox" />
                <label for="fmt_auto_scan">Включить авто-сканирование</label>
            </div>
            
            <hr />
            
            <div style="display: flex; gap: 10px;">
                <input id="fmt_manual_scan" class="menu_button" type="submit" value="Сканировать сообщение" />
                <input id="fmt_clear_facts" class="menu_button" type="submit" value="Очистить список" style="background-color: #5c1d1d !important;" />
            </div>

            <div style="margin-top:15px;">
                <b>Сохраненные факты:</b>
                <div id="fmt_facts_list" style="margin-top:10px; max-height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 5px;">
                    <small style="opacity:0.5;">Список пуст...</small>
                </div>
            </div>
        </div>
    </div>
</div>
